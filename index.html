<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pattcha Inventory</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>
<body>

  <div id="sharedHeader" class="shared-header header-center">
    <img src="https://drive.google.com/thumbnail?id=1H7haMB9djDC8J7-C0LiIvTGcuXQIDxf2&sz=w800" alt="Logo" class="app-logo">
    <div id="mainMenuTitleGroup" class="hide" style="width: 100%; text-align: center;">
      <div style="display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 15px;">
        <div style="height: 1px; width: 35px; background: #e7a08c;"></div>
        <h2 style="color: #db8591; margin: 0; font-size: 16px; font-weight: bold; letter-spacing: 4px;">MAIN MENU</h2>
        <div style="height: 1px; width: 35px; background: #e7a08c;"></div>
      </div>
      <p id="branchLabel" style="color: #e7a08c; font-size: 11px; margin-top: 8px; font-weight: bold;"></p>
    </div>
  </div>

  <div id="loginView" class="view-screen">
    <div class="login-input-area">
      <input type="text" id="branchCodeInput" class="login-input" placeholder="กรุณากรอกรหัสสาขา">
      <button id="btnSubmitLogin" class="login-btn">SUBMIT</button>
    </div>
  </div>

  <div id="mainMenuView" class="view-screen hide" style="justify-content: flex-start; padding-top: 250px;">
    
    <div class="menu-container" style="width: 85%; max-width: 340px; display: flex; flex-direction: column; gap: 10px;">
      <button id="btnMenuStock" class="menu-card"><div class="menu-icon"><i class="fas fa-warehouse"></i></div><div class="menu-text">STOCK IN HOUSE</div><div class="menu-arrow">❯</div></button>
      <button id="btnMenuTransfer" class="menu-card"><div class="menu-icon"><i class="fas fa-random"></i></div><div class="menu-text">TRANSFER PRODUCT</div><div class="menu-arrow">❯</div></button>
      <button id="btnMenuHold" class="menu-card"><div class="menu-icon"><i class="fas fa-lock"></i></div><div class="menu-text">HOLD PRODUCT</div><div class="menu-arrow">❯</div></button>
      <button id="btnMenuDefect" class="menu-card"><div class="menu-icon"><i class="fas fa-exclamation-triangle"></i></div><div class="menu-text">DEFECTIVE</div><div class="menu-arrow">❯</div></button>
      <button id="btnMenuTake" class="menu-card"><div class="menu-icon"><i class="fas fa-chart-bar"></i></div><div class="menu-text">STOCK TAKE</div><div class="menu-arrow">❯</div></button>
      <button id="btnMenuAdjust" class="menu-card"><div class="menu-icon"><i class="fas fa-tools"></i></div><div class="menu-text">ADJUST STOCK</div><div class="menu-arrow">❯</div></button>
      <button id="btnMenuLocation" class="menu-card"><div class="menu-icon"><i class="fas fa-map-marker-alt"></i></div><div class="menu-text">LOCATION</div><div class="menu-arrow">❯</div></button>
    </div>
    
    <div style="margin-top: 25px; margin-bottom: 25px;">
      <button id="btnLogout" style="background: transparent; border: none; color: #db8591; font-size: 12px; font-weight: bold; text-decoration: underline; cursor: pointer; padding: 10px;">LOGOUT SYSTEM</button>
    </div>
  </div>

  <div id="stockInHouseView" class="view-screen hide" style="justify-content: flex-start; background-color: #f9fafb; display: flex; flex-direction: column;">
    <div style="width: 100%; background: linear-gradient(135deg, #db8591 0%, #e7a08c 50%, #fab919 100%); flex-shrink: 0; box-shadow: 0 4px 15px rgba(219, 133, 145, 0.4); padding-bottom: 20px; z-index: 10;">
      <div style="width: 100%; display: flex; align-items: center; justify-content: space-between; padding: 20px; box-sizing: border-box;">
        <button id="btnStockBack" style="background: #ffffff; border: none; color: #db8591; font-size: 13px; font-weight: bold; cursor: pointer; padding: 8px 15px; border-radius: 20px; box-shadow: 0 4px 8px rgba(0,0,0,0.15);">
          <i class="fas fa-chevron-left"></i> BACK
        </button>
        <h3 id="stockHeaderTitle" style="color: #ffffff; margin: 0; font-size: 16px; font-weight: bold; text-align: center; flex: 1;">STOCK IN HOUSE</h3>
        <div style="width: 80px;"></div>
      </div>
      <div id="unifiedInputArea" style="width: 100%; padding: 0px 20px; box-sizing: border-box;">
        <div id="searchContainer" style="position: relative;">
          <i class="fas fa-search" style="position: absolute; left: 20px; top: 16px; color: #db8591;"></i>
          <input type="text" id="searchStockInput" placeholder="ค้นหาสินค้า (SKU, หมวดหมู่...)" style="width: 100%; padding: 15px 45px 15px 50px; border-radius: 30px; border: none; outline: none; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
          <div id="clearSearchBtn" style="position: absolute; right: 15px; top: 13px; width: 24px; height: 24px; border-radius: 50%; background: #db8591; color: white; display: none; justify-content: center; align-items: center; cursor: pointer;">
            <i class="fas fa-times" style="font-size: 12px;"></i>
          </div>
        </div>
        <div id="readerContainer" style="display:none; position: relative; width: 100%; margin-top: 10px;">
          <div id="reader" style="width: 100%; border: 2px solid #ffffff; border-radius: 12px; overflow: hidden; background: #000;"></div>
          <button id="btnScannerClose" style="position: absolute; top: 10px; right: 10px; background: #ef4444; color: white; border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; z-index: 100;">
            <i class="fas fa-times"></i>
          </button>
        </div>
      </div>
    </div>
    <div id="stockScrollArea" style="flex: 1; overflow-y: auto; width: 100%; padding-bottom: 20px;">
      <div id="categoryListContainer" style="width: 100%; display: flex; flex-direction: column;"></div>
      <div id="productListContainer" class="hide" style="width: 100%; display: flex; flex-direction: column;"></div>
    </div>
    <div style="width: 100%; padding: 15px; background: #ffffff; border-top: 1px solid rgba(231, 160, 140, 0.2); box-sizing: border-box; z-index: 10;">
      <button id="btnScannerOpen" style="width: 100%; background: linear-gradient(135deg, #db8591 0%, #e7a08c 50%, #fab919 100%); color: white; border: none; border-radius: 12px; padding: 15px; font-size: 20px; box-shadow: 0 6px 15px rgba(219,133,145,0.3); display: flex; justify-content: center; align-items: center; cursor: pointer;">
        <i class="fas fa-camera"></i>
      </button>
    </div>
  </div>

  <div id="productDetailModal" class="hide" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #ffffff; z-index: 999; display: flex; flex-direction: column;">
    <button id="btnCloseModal" style="position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.5); border: none; color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 18px; z-index: 1000;"><i class="fas fa-times"></i></button>
    
    <div style="flex: 0 0 35vh; width: 100%; background: #f9fafb; border-bottom: 1px solid #eee; display: flex; justify-content: center; align-items: center; overflow: hidden;">
      <img id="detailImage" src="" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/1/14/No_Image_Available.jpg'" style="max-width: 100%; max-height: 100%; object-fit: contain; padding: 20px; box-sizing: border-box;">
    </div>
    
    <div style="flex: 1; padding: 20px; overflow-y: auto; background: #ffffff;">
      <div style="text-align: center; margin-bottom: 20px; background: #ffffff; padding: 10px; border-radius: 12px; border: 1px solid #eee; box-shadow: 0 2px 5px rgba(0,0,0,0.02);">
        <svg id="detailBarcode"></svg>
      </div>
      <h4 style="margin: 0 0 10px 0; color: #db8591; font-size: 14px; border-bottom: 1px solid #eee; padding-bottom: 8px; text-transform: uppercase;">Product Details</h4>
      <div style="margin-bottom: 20px;">
        <div id="detailCategory" style="font-size: 12px; color: #db8591; font-weight: bold; margin-bottom: 5px;"></div>
        <div id="detailSku" style="font-size: 18px; font-weight: bold; color: #333; margin-bottom: 5px;"></div>
        <div id="detailName" style="font-size: 14px; color: #666; margin-bottom: 10px;"></div>
        <div id="detailPrice" style="font-size: 22px; font-weight: bold; color: #fab919;"></div>
      </div>
      <h4 style="margin: 0 0 10px 0; color: #db8591; font-size: 14px; border-bottom: 1px solid #eee; padding-bottom: 8px; text-transform: uppercase;">Inventory Status</h4>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding-bottom: 20px;">
        <div class="detail-stat-box"><span class="lbl">Current Stock</span><span class="val" id="detailCurrent"></span></div>
        <div class="detail-stat-box"><span class="lbl">Available Stock</span><span class="val" id="detailAvail" style="color:#10b981;"></span></div>
        <div class="detail-stat-box"><span class="lbl">Hold Qty</span><span class="val" id="detailHold" style="color:#fab919;"></span></div>
        <div class="detail-stat-box"><span class="lbl">Defective Qty</span><span class="val" id="detailDefect" style="color:#ef4444;"></span></div>
        <div class="detail-stat-box" style="grid-column: span 2;"><span class="lbl">Sale Stock</span><span class="val" id="detailSold" style="color:#db8591;"></span></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
  <script src="app.js"></script>
  <script src="scanner.js"></script>
</body>
</html>
