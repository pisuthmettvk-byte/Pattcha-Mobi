<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <title>Pattcha Inventory</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div id="loginView" class="view-screen">
            <img src="https://drive.google.com/thumbnail?id=1H7haMB9djDC8J7-C0LiIvTGcuXQIDxf2&sz=w800" alt="Logo" class="main-logo" style="margin-bottom: 40px;">
            <div style="width: 80%; max-width: 320px; margin-bottom: 20px;">
                <input type="text" id="branchCodeInput" class="login-input" placeholder="กรุณากรอกรหัสสาขา">
            </div>
            <button id="btnSubmitLogin" class="login-btn" onclick="submitLogin()">SUBMIT</button>
        </div>

        <div id="mainMenuView" class="view-screen hide">
            <div style="text-align: center; width: 100%;">
                <img src="https://drive.google.com/thumbnail?id=1H7haMB9djDC8J7-C0LiIvTGcuXQIDxf2&sz=w800" alt="Logo" class="main-logo logo-style">
                <div style="display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: -5px;">
                    <div style="height: 1px; width: 35px; background: #e7a08c;"></div>
                    <h2 style="color: #db8591; margin: 0; font-size: 16px; font-weight: bold; letter-spacing: 4px;">MAIN MENU</h2>
                    <div style="height: 1px; width: 35px; background: #e7a08c;"></div>
                </div>
                <p id="branchLabel" style="color: #e7a08c; font-size: 11px; margin-top: 8px; font-weight: bold;"></p>
            </div>
            
            <div class="menu-container" style="width: 90%; max-width: 350px;">
                <button class="menu-card" onclick="openStockInHouse()">
                    <div class="menu-icon"><i class="fas fa-warehouse"></i></div>
                    <div class="menu-text">STOCK IN HOUSE</div>
                    <div class="menu-arrow">❯</div>
                </button>
                <button class="menu-card" onclick="alert('TRANSFER PRODUCT - กำลังพัฒนา')">
                    <div class="menu-icon"><i class="fas fa-random"></i></div>
                    <div class="menu-text">TRANSFER PRODUCT</div>
                    <div class="menu-arrow">❯</div>
                </button>
                <button class="menu-card" onclick="alert('HOLD PRODUCT - กำลังพัฒนา')">
                    <div class="menu-icon"><i class="fas fa-lock"></i></div>
                    <div class="menu-text">HOLD PRODUCT</div>
                    <div class="menu-arrow">❯</div>
                </button>
                <button class="menu-card" onclick="alert('DEFECTIVE - กำลังพัฒนา')">
                    <div class="menu-icon"><i class="fas fa-exclamation-triangle"></i></div>
                    <div class="menu-text">DEFECTIVE</div>
                    <div class="menu-arrow">❯</div>
                </button>
                <button class="menu-card" onclick="alert('STOCK TAKE - กำลังพัฒนา')">
                    <div class="menu-icon"><i class="fas fa-chart-bar"></i></div>
                    <div class="menu-text">STOCK TAKE</div>
                    <div class="menu-arrow">❯</div>
                </button>
                <button class="menu-card" onclick="alert('ADJUST STOCK - กำลังพัฒนา')">
                    <div class="menu-icon"><i class="fas fa-tools"></i></div>
                    <div class="menu-text">ADJUST STOCK</div>
                    <div class="menu-arrow">❯</div>
                </button>
                <button class="menu-card" onclick="alert('LOCATION - กำลังพัฒนา')">
                    <div class="menu-icon"><i class="fas fa-map-marker-alt"></i></div>
                    <div class="menu-text">LOCATION</div>
                    <div class="menu-arrow">❯</div>
                </button>
            </div>
            
            <div style="margin-top: 10px; margin-bottom: 20px;">
                <button onclick="logoutBranch()" style="background: transparent; border: none; color: #db8591; font-size: 12px; font-weight: bold; text-decoration: underline; cursor: pointer; padding: 10px;">LOGOUT SYSTEM</button>
            </div>
        </div>

        <div id="stockInHouseView" class="view-screen hide" style="justify-content: flex-start; background-color: #f9fafb; height: 100vh; width: 100vw; overflow: hidden; display: flex; flex-direction: column;">
            <div style="width: 100%; background: linear-gradient(135deg, #db8591 0%, #e7a08c 50%, #fab919 100%); background-size: 200% auto; flex-shrink: 0; box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2); padding-bottom: 20px; z-index: 50; position: relative;">
                <div style="width: 100%; display: flex; align-items: center; justify-content: space-between; padding: 20px 20px 10px 20px; box-sizing: border-box;">
                    <button onclick="handleStockBack()" style="background: #ffffff; border: none; color: #db8591; font-size: 13px; font-weight: bold; cursor: pointer; padding: 8px 15px; border-radius: 20px; box-shadow: 0 4px 8px rgba(0,0,0,0.15);">
                        <i class="fas fa-chevron-left"></i> BACK
                    </button>
                    <h3 id="stockHeaderTitle" style="color: #ffffff; margin: 0; font-size: 16px; font-weight: bold; text-align: center; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 0 10px;">STOCK IN HOUSE</h3>
                    <div style="width: 80px;"></div>
                </div>
                <div id="unifiedInputArea" style="width: 100%; padding: 0px 20px; box-sizing: border-box;">
                    <div id="searchContainer" style="position: relative; width: 100%;">
                        <i class="fas fa-search" style="position: absolute; left: 15px; top: 16px; color: #db8591;"></i>
                        <input type="text" id="searchStockInput" oninput="handleMagicSearch()" placeholder="ค้นหาสินค้า..." style="width: 100%; padding: 15px 45px 15px 45px; border-radius: 30px; border: none; outline: none; box-shadow: 0 4px 10px rgba(0,0,0,0.1); box-sizing: border-box; font-size: 16px;">
                        <div id="clearSearchBtn" onclick="clearSearch()" style="position: absolute; right: 10px; top: 11px; width: 26px; height: 26px; border-radius: 50%; background: #db8591; color: white; display: none; justify-content: center; align-items: center; cursor: pointer;">
                            <i class="fas fa-times" style="font-size: 12px;"></i>
                        </div>
                    </div>
                </div>
            </div>
            
            <div id="stockScrollArea" style="flex: 1; overflow-y: auto; width: 100%; padding-bottom: 120px; box-sizing: border-box; -webkit-overflow-scrolling: touch; background: #f3f4f6;">
                <div id="categoryListContainer" style="width: 100%; display: flex; flex-direction: column;"></div>
                <div id="productListContainer" class="hide" style="width: 100%; display: flex; flex-direction: column;"></div>
            </div>
            
            <div style="position: fixed; bottom: 0; left: 0; width: 100%; padding: 15px 20px; background: #ffffff; border-top: 1px solid rgba(231, 160, 140, 0.2); box-sizing: border-box; z-index: 50; padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 35px); box-shadow: 0 -8px 25px rgba(0, 0, 0, 0.1);">
                <button onclick="toggleScanner()" style="width: 100%; background: linear-gradient(135deg, #db8591 0%, #e7a08c 50%, #fab919 100%); color: white; border: none; border-radius: 12px; padding: 15px; font-size: 20px; box-shadow: 0 6px 15px rgba(219,133,145,0.4); display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.2s;">
                    <i class="fas fa-camera"></i>
                </button>
            </div>
        </div>
        
        <div id="productDetailModal" class="hide" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #e5e7eb; z-index: 999; display: flex; flex-direction: column;">
            
            <button onclick="closeProductDetail()" style="position: absolute; top: 20px; right: 20px; background: #ef4444; border: none; color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 18px; z-index: 1000; box-shadow: 0 4px 10px rgba(239, 68, 68, 0.4);">
                <i class="fas fa-times"></i>
            </button>
            
            <div style="height: 40vh; width: 100%; background: #e5e7eb; display: flex; justify-content: center; align-items: center; padding: 30px; box-sizing: border-box;">
                <img id="detailImage" src="" style="max-width: 100%; max-height: 100%; object-fit: contain; filter: drop-shadow(0px 12px 24px rgba(0,0,0,0.25));">
            </div>
            
            <div style="flex: 1; padding: 25px; overflow-y: auto; background: #f3f4f6; border-radius: 28px 28px 0 0; margin-top: -30px; z-index: 2; box-shadow: 0 -12px 30px rgba(0,0,0,0.12);">
                <div id="detailSku" style="font-size: 20px; font-weight: bold; color: #333;"></div>
                <div id="detailName" style="font-size: 14px; color: #666; margin-bottom: 10px;"></div>
                <div id="detailPrice" style="font-size: 24px; font-weight: bold; color: #db8591; margin-bottom: 25px;"></div>
                
                <div style="width: 100%; height: 80px; background: #ffffff; border: 2px dashed #db8591; border-radius: 12px; display: flex; justify-content: center; align-items: center; margin-bottom: 25px; opacity: 0.7;">
                    <div id="barcodeContainer" style="color: #db8591; font-size: 13px; font-weight: bold;">
                        <i class="fas fa-barcode" style="font-size: 24px; margin-right: 10px;"></i> [ พื้นที่สำหรับสร้าง BARCODE ]
                    </div>
                </div>

                <h4 style="margin: 0 0 10px 0; color: #444; font-size: 13px; border-bottom: 1px solid #ddd; padding-bottom: 8px;">ITEM DETAILS</h4>
                <div style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-bottom: 25px;">
                    <div class="detail-stat-box"><span class="lbl">M.CAT</span><span class="val" id="detailMainCat"></span></div>
                    <div class="detail-stat-box"><span class="lbl">S.CAT</span><span class="val" id="detailSubCat"></span></div>
                    <div class="detail-stat-box"><span class="lbl">MAT</span><span class="val" id="detailMatCode"></span></div>
                    <div class="detail-stat-box"><span class="lbl">STYLE</span><span class="val" id="detailStyleCode"></span></div>
                    <div class="detail-stat-box"><span class="lbl">PROD</span><span class="val" id="detailProdCode"></span></div>
                </div>

                <h4 style="margin: 0 0 10px 0; color: #444; font-size: 13px; border-bottom: 1px solid #ddd; padding-bottom: 8px;">INVENTORY STATUS</h4>
                <div style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-bottom: 20px;">
                    <div class="detail-stat-box"><span class="lbl">Current</span><span class="val" id="detailCurrent" style="color:#3b82f6;"></span></div>
                    <div class="detail-stat-box"><span class="lbl">Avail</span><span class="val" id="detailAvail" style="color:#10b981;"></span></div>
                    <div class="detail-stat-box"><span class="lbl">Hold</span><span class="val" id="detailHold" style="color:#f59e0b;"></span></div>
                    <div class="detail-stat-box"><span class="lbl">Defect</span><span class="val" id="detailDefect" style="color:#ef4444;"></span></div>
                    <div class="detail-stat-box"><span class="lbl">Sale</span><span class="val" id="detailSale" style="color:#8b5cf6;"></span></div>
                </div>
            </div>
        </div>

        <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
        <script src="app.js"></script>
        <script src="scanner.js"></script>
    </body>
</html>
